app-id: io.github.achimgrothkopp_ux.Newsgator
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
# PySide6 + the Qt bindings are layered in via the Flathub BaseApp instead of
# being pip-installed — the bundled wheel ships its own Qt, which would
# conflict with the runtime's Qt and bloat the image.
base: io.qt.PySide.BaseApp
base-version: "6.7"
command: newsgator

# Strip BaseApp leftovers + the usual dev junk so the bundle stays slim.
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
  - '*.la'
  - '*.a'
cleanup-commands:
  - /app/cleanup-BaseApp.sh

finish-args:
  # Wayland first, X11 as fallback.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # The QtWebEngine BaseApp installs the helper at /app/bin, but Qt's
  # default search hits /usr first; point it at the right path so the
  # "Webseite" tab can spawn its Chromium child process.
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess
  # Network: feed sync + image fetch + archive download.
  - --share=network
  # GPU + accelerated video for QtWebEngine.
  - --device=dri
  - --socket=pulseaudio
  # Persist the DB and any user data under XDG_DATA_HOME/newsgator.
  - --persist=.
  # Allow opening saved HTML / OPML through the system file picker.
  - --filesystem=xdg-download
  - --filesystem=xdg-documents

modules:
  # KDE 6.7 runtime ships setuptools 71 in /usr/lib (read-only) which already
  # has the strict pyproject.toml validator that rejects many older sdists
  # (regex, greenlet 3.5, etc.). We install setuptools 68.2.2 — the last
  # version with lenient license validation — into /app where it sits ahead
  # of the runtime's copy on sys.path. --ignore-installed prevents pip from
  # trying to uninstall the read-only /usr copy first.
  - name: pinned-setuptools
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation
          --ignore-installed
          setuptools-68.2.2-py3-none-any.whl wheel-0.45.1-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/bb/26/7945080113158354380a12ce26873dd6c1ebd88d47f5bc24e2c5bb38c16a/setuptools-68.2.2-py3-none-any.whl
        sha256: b454a35605876da60632df1a60f736524eb73cc47bbc9f3f1ef1b644de74fd2a
      - type: file
        url: https://files.pythonhosted.org/packages/0b/2c/87f3254fd8ffd29e4c02732eee68a83a1d3c346ae39bc6822dcbcb697f2b/wheel-0.45.1-py3-none-any.whl
        sha256: 708e7481cc80179af0e556bbf0cc00b8444c7321e2700b8d8580231d13017248

  # Pip-installed Python dependencies. The python-deps.yaml file is
  # generated by flatpak-pip-generator (see flatpak/regenerate-python-deps.sh)
  # and must be committed alongside this manifest before a Flathub build.
  - python-deps.yaml

  - name: newsgator
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
      - install -Dm644 flatpak/io.github.achimgrothkopp_ux.Newsgator.desktop
          ${FLATPAK_DEST}/share/applications/io.github.achimgrothkopp_ux.Newsgator.desktop
      - install -Dm644 flatpak/io.github.achimgrothkopp_ux.Newsgator.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/io.github.achimgrothkopp_ux.Newsgator.metainfo.xml
      - install -Dm644 flatpak/icons/io.github.achimgrothkopp_ux.Newsgator.svg
          ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.achimgrothkopp_ux.Newsgator.svg
    sources:
      - type: dir
        path: ..
